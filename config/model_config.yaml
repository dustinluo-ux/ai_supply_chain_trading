use_ml: true
active_model: catboost
models:
  ml_blend_weight: 0.3
  linear: null
  ridge:
    alpha: 0.001
  lasso:
    alpha: 0.1
  xgboost:
    n_estimators: 100
    max_depth: 3
    learning_rate: 0.1
    subsample: 0.8
    colsample_bytree: 0.8
    random_state: 42
  catboost:
    iterations: 500
    depth: 4
    learning_rate: 0.05
    loss_function: RMSE
    random_seed: 42
    verbose: 0
features:
  news_lookback_days: 7
  feature_names:
  - rsi_norm
  - sentiment_velocity
  - news_sentiment
  - cmf_norm
  - macd_norm
training:
  train_start: '2022-01-01'
  train_end: '2023-12-31'
  test_start: '2024-01-01'
  test_end: '2024-12-31'
  validation_split: 0.2
  residual_target: true
  smh_benchmark_path: trading_data/benchmarks/SMH.csv
  rolling_beta_window: 60
  save_models: true
  model_save_dir: models/saved/
  model_path: C:\Users\dusro\OneDrive\Programming\ai_supply_chain_trading\models\saved\catboost_20260308_103404.pkl
logging:
  log_predictions: true
  log_feature_importance: true
  log_dir: logs/models/
tracks:
  A:
    model_path: C:\Users\dusro\OneDrive\Programming\ai_supply_chain_trading\models\saved\catboost_20260308_103404.pkl
  B:
    model_path: C:\Users\dusro\OneDrive\Programming\ai_supply_chain_trading\models\saved\ridge_optimized_20260227_230227.pkl
  D:
    mode: long_short_130_30
    top_n: 15
    bottom_n: 8
    target_vol: 0.40
    max_leverage: 1.6
    max_position: 0.10
    thesis_alert_rho: 0.8
    borrow_cost_threshold: 0.05
    dispersion_anchor: 0.40   # 40% annualised vol = full short exposure (S=0.30)

pods:
  meta_allocator:
    temperature: 0.5
    ballast_floor: 0.20
    prior:
      core: 0.50
      extension: 0.30
      ballast: 0.20
  sector_cap: 0.40
  gross_cap: 1.60
  fitness_path: outputs/pod_fitness.json
  meta_weights_path: outputs/meta_weights.json
